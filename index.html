<!DOCTYPE html>
<html lang="pl" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassSpace - Rezerwacja Sal</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
</head>

<body>

    <div id="app-page">
        <div class="container">

            <div class="top-actions">
                <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn-app">Alternatywny Motyw</button>
                <button class="btn btn-return" onclick="logout()"
                    style="padding: 6px 12px; font-size: 13px;">Wyloguj</button>
            </div>

            <div class="header">
                <div>
                    <h1>ClassSpace</h1>
                    <div class="subtitle">System Rezerwacji Zasobów</div>
                </div>
            </div>

            <div class="role-selector">
                <button class="btn-role active" onclick="switchAppRole('wykladowca')"
                    id="btn-wykladowca">Wykładowca</button>
                <button class="btn-role" onclick="switchAppRole('portiernia')" id="btn-portiernia">Portiernia</button>
                <button class="btn-role" onclick="switchAppRole('admin')" id="btn-admin">Administracja</button>
            </div>

            <div id="app-alert-msg" class="alert"></div>

            <div id="view-wykladowca" class="view-section active">
                <div class="form-panel">
                    <div class="form-row">
                        <div class="input-group">
                            <label for="user-name">Imię i Nazwisko</label>
                            <input type="text" id="user-name" placeholder="Pobieranie danych...">
                        </div>
                        <div class="input-group">
                            <label for="booking-subject">Temat zajęć</label>
                            <input type="text" id="booking-subject" placeholder="np. Algorytmy">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="input-group">
                            <label for="search-date">Data</label>
                            <input type="date" id="search-date">
                        </div>
                        <div class="input-group">
                            <label for="search-time">Godzina rozpoczęcia</label>
                            <input type="time" id="search-time">
                        </div>
                        <div class="input-group">
                            <label for="search-duration">Czas trwania (min)</label>
                            <select id="search-duration">
                                <option value="45">45 min</option>
                                <option value="90" selected>90 min</option>
                                <option value="180">180 min</option>
                            </select>
                        </div>
                        <div class="input-group">
                            <label for="min-capacity">Min. pojemność</label>
                            <input type="number" id="min-capacity" value="10" min="1">
                        </div>
                    </div>

                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <div class="checkbox-group">
                            <input type="checkbox" id="req-projector">
                            <label for="req-projector" style="text-transform: none; font-size: 14px;">Wymaga rzutnika</label>
                        </div>
                        <button class="btn btn-search" onclick="refreshViews()">Zastosuj filtry</button>
                    </div>
                </div>

                <div class="section-title">Mapa kampusu</div>
                <div class="interactive-map-container" id="interactive-map"></div>
                <div id="map-actions-panel" style="display: none; margin-bottom: 40px;"></div>

                <div class="section-title"
                    style="margin-top: 40px; border-bottom: 1px solid var(--border); padding-bottom: 10px;">Dostępne sale</div>
                <div id="wykladowca-rooms-list"></div>
            </div>

            <div id="view-portiernia" class="view-section portiernia-view">
                <div class="portiernia-header">
                    <div>
                        <h2 class="portiernia-title">Panel Zarządzania</h2>
                        <p class="sync-info">Zgłoszenia zsynchronizowane w bazie.</p>
                    </div>
                    <div id="live-clock"
                        style="font-family: monospace; font-size: 18px; font-weight: bold; color: var(--text-main); margin-bottom: 15px;">
                        00:00:00</div>
                </div>

                <div class="section-title">Zgłoszenia serwisowe z sal</div>
                <div id="portiernia-issues-list" style="margin-bottom: 50px;"></div>

                <div class="section-title">Klucze w użyciu (Zajęcia)</div>
                <div id="portiernia-rooms-list"></div>
            </div>

            <div id="view-admin" class="view-section">
                <div class="portiernia-header">
                    <div>
                        <h2 class="portiernia-title">Logi systemowe</h2>
                        <p class="sync-info">Zapis z bazy Firebase w czasie rzeczywistym.</p>
                    </div>
                    <button class="btn btn-cancel" onclick="adminClearAll()" style="margin-bottom: 15px;">Twardy reset sal</button>
                </div>

                <div class="form-container">
                    <div style="display: flex; justify-content: flex-end; margin-bottom: 15px;">
                        <button class="btn btn-return" onclick="exportToCSV()" style="padding: 8px 15px;">Eksportuj CSV</button>
                    </div>
                    <div id="logs-container"
                        style="height: 400px; overflow-y: auto; background: var(--card-bg); border-radius: var(--radius); border: 1px solid var(--border); padding: 20px; font-family: monospace; font-size: 13px; line-height: 1.8;">
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
