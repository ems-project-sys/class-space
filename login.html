<!DOCTYPE html>
<html lang="pl" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ClassSpace - Logowanie</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="login-page">
        <button class="theme-toggle" onclick="toggleTheme()" id="theme-btn-login">🌙 Ciemny</button>

        <div class="auth-card">
            <div class="header">
                <h1>ClassSpace</h1>
                <p>System Rezerwacji Zasobów</p>
            </div>

            <div class="auth-tabs">
                <button class="tab-btn active" onclick="switchTab('login')" id="tab-login">Logowanie</button>
                <button class="tab-btn" onclick="switchTab('register')" id="tab-register">Rejestracja</button>
            </div>

            <div id="auth-alert-box" class="alert"></div>

            <form id="form-login" class="auth-form active" onsubmit="handleLogin(event)">
                <div class="input-group">
                    <label for="login-email">Adres E-mail</label>
                    <input type="email" id="login-email" placeholder="jan.kowalski@uczelnia.pl" required>
                </div>
                <div class="input-group">
                    <label for="login-password">Hasło</label>
                    <input type="password" id="login-password" placeholder="••••••••" required>
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('login-password')">Pokaż</button>
                </div>
                <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; font-size: 13px;">
                    <label style="text-transform: none; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                        <input type="checkbox" checked> Zapamiętaj mnie
                    </label>
                    <a href="#" style="color: var(--primary); text-decoration: none; font-weight: 600;">Zapomniałeś hasła?</a>
                </div>
                <div class="captcha-container">
                    <span style="font-size: 13px; font-weight: 600; color: var(--text-muted);">Zabezpieczenie:</span>
                    <span class="captcha-equation" id="login-captcha-eq">? + ? =</span>
                    <input type="text" id="login-captcha-input" class="captcha-input" required autocomplete="off">
                    <button type="button" class="captcha-refresh" onclick="generateCaptcha('login')" title="Losuj nowe">🔄</button>
                </div>
                <button type="submit" class="btn-submit">Zaloguj się</button>
            </form>

            <form id="form-register" class="auth-form" onsubmit="handleRegister(event)">
                <div class="input-group">
                    <label>Wybierz swoją rolę</label>
                    <div class="role-grid">
                        <div class="role-option selected" id="role-lecturer" onclick="selectRole('lecturer')">
                            <span class="role-icon">🧑‍🏫</span> Wykładowca
                        </div>
                        <div class="role-option" id="role-admin" onclick="selectRole('admin')">
                            <span class="role-icon">⚙️</span> Administrator
                        </div>
                    </div>
                    <input type="hidden" id="register-role" value="wykladowca">
                </div>
                <div class="input-group">
                    <label for="register-name">Imię i Nazwisko</label>
                    <input type="text" id="register-name" placeholder="Np. Dr Anna Nowak" required>
                </div>
                <div class="input-group">
                    <label for="register-email">Służbowy E-mail</label>
                    <input type="email" id="register-email" placeholder="anna.nowak@uczelnia.pl" required>
                </div>
                <div class="input-group">
                    <label for="register-password">Hasło</label>
                    <input type="password" id="register-password" placeholder="Minimum 8 znaków" required oninput="checkPasswordStrength()">
                    <button type="button" class="toggle-password" onclick="togglePasswordVisibility('register-password')">Pokaż</button>
                    <div class="password-strength">
                        <div class="strength-bar" id="strength-bar"></div>
                    </div>
                    <div class="strength-text" id="strength-text">Wpisz hasło</div>
                </div>
                <div class="input-group">
                    <label for="register-confirm">Potwierdź Hasło</label>
                    <input type="password" id="register-confirm" placeholder="Wpisz ponownie hasło" required>
                </div>
                <div class="captcha-container">
                    <span style="font-size: 13px; font-weight: 600; color: var(--text-muted);">Zabezpieczenie:</span>
                    <span class="captcha-equation" id="register-captcha-eq">? + ? =</span>
                    <input type="text" id="register-captcha-input" class="captcha-input" required autocomplete="off">
                    <button type="button" class="captcha-refresh" onclick="generateCaptcha('register')" title="Losuj nowe">🔄</button>
                </div>
                <button type="submit" class="btn-submit" style="background-color: var(--success);">Załóż konto</button>
            </form>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
